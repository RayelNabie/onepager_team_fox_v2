name: 3 - Deploy

on:
  workflow_run:
    workflows: ["2 - Build"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SFTP_SERVER: ${{ secrets.SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          lftp -e "set sftp:auto-confirm yes; set net:timeout 30; set net:max-retries 3; open -u \"$SFTP_USERNAME,$SFTP_PASSWORD\" sftp://$SFTP_SERVER; mirror -R --delete ./dist/ /public_html/2025_2026/idp_ds_t9/; quit"
